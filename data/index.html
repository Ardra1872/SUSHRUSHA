<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushrusha - Smart MedBox Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body { margin: 0; font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; }
        #canvas-container { width: 100vw; height: 100vh; background: #f0f4f8; position: fixed; top: 0; left: 0; z-index: 0; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08); 
        }
        .slot-active {
            border-color: #EF4444 !important;
            background-color: #FEF2F2 !important;
            animation: slot-pulse 1.5s infinite;
        }
        @keyframes slot-pulse {
            0%, 100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.2); }
            50% { box-shadow: 0 0 0 8px rgba(239, 68, 68, 0); }
        }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    </style>
</head>
<body class="text-slate-800">

<div id="canvas-container"></div>

<div id="ui-layer" class="relative z-10 w-full h-screen pointer-events-none p-6 flex flex-col justify-between">
    <header class="flex justify-between items-start pointer-events-auto">
        <div class="glass-panel p-4 rounded-2xl flex items-center gap-4">
            <div class="size-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                <span class="material-symbols-outlined">deployed_code</span>
            </div>
            <div>
                <h1 class="text-lg font-bold leading-tight">Sushrusha</h1>
                <p class="text-xs text-slate-500 font-medium tracking-wide">DIGITAL TWIN SIMULATION</p>
            </div>
        </div>

        <div class="glass-panel p-4 rounded-2xl flex flex-col items-end min-w-[160px]">
            <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-1">Simulated Time</span>
            <div id="sim-time" class="text-4xl font-extrabold font-mono text-slate-800 tracking-tight leading-none">00:00</div>
             <div class="flex items-center gap-1 mt-1 text-xs text-slate-500">
                 <span id="sync-dot" class="size-2 rounded-full bg-slate-300"></span>
                 <span id="sync-text">Connecting...</span>
            </div>
        </div>
    </header>

    <div class="flex-1 flex justify-between items-center py-6 w-full pointer-events-none">
        <div class="glass-panel w-80 rounded-3xl p-5 pointer-events-auto flex flex-col max-h-[70vh]">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-bold uppercase tracking-wide text-slate-600 flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">medication</span>
                    Slots Status
                </h2>
                <span class="bg-blue-100 text-blue-700 text-[10px] px-2 py-0.5 rounded-full font-bold">4 Active</span>
            </div>
            <div id="slots-container" class="space-y-3 overflow-y-auto custom-scroll pr-1 flex-1 text-xs">
                <!-- Slot cards injected here -->
            </div>
        </div>

        <div class="glass-panel w-72 rounded-3xl p-5 pointer-events-auto flex flex-col gap-4">
            <h2 class="text-sm font-bold uppercase tracking-wide text-slate-600 flex items-center gap-2">
                <span class="material-symbols-outlined text-lg">schedule</span>
                New Schedule
            </h2>
            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Medicine Name</label>
                    <input id="med-input" type="text" placeholder="e.g., Para 500" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500/20 transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase">Select Slot</label>
                    <select id="slot-select" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500/20 transition-all">
                        <option value="1">Slot 1</option>
                        <option value="2">Slot 2</option>
                        <option value="3">Slot 3</option>
                        <option value="4">Slot 4</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Hour</label>
                        <input id="hh-input" type="number" min="0" max="23" placeholder="HH" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500/20 transition-all">
                    </div>
                    <div class="flex-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Minute</label>
                        <input id="mm-input" type="number" min="0" max="59" placeholder="MM" class="w-full mt-1 bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-blue-500/20 transition-all">
                    </div>
                </div>
                <button onclick="setSlot()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 rounded-xl transition-all shadow-lg shadow-blue-500/20 active:scale-95">Set Schedule</button>
            </div>
        </div>
    </div>

    <div class="flex justify-center items-end pointer-events-none">
        <div class="glass-panel p-2 rounded-2xl flex items-center gap-3 pointer-events-auto shadow-xl">
            <div class="flex items-center bg-white/50 rounded-xl p-1 border border-slate-100 shadow-inner">
                <button onclick="window.location.reload()" class="size-9 rounded-lg hover:bg-white text-slate-500 flex items-center justify-center transition-all active:scale-90" title="Reload Page">
                    <span class="material-symbols-outlined text-lg">refresh</span>
                </button>
                <div class="w-px h-6 bg-slate-200 mx-1"></div>
                <div class="px-3 flex flex-col justify-center">
                    <span class="text-[9px] font-bold uppercase text-slate-400 leading-none mb-1">System State</span>
                    <span class="text-xs font-bold text-green-600 flex items-center gap-1">
                        <span class="size-1.5 rounded-full bg-green-500"></span>
                        Healthy
                    </span>
                </div>
            </div>
            <div id="log-console" class="w-64 h-12 bg-slate-900 rounded-xl p-2.5 font-mono text-[10px] text-green-400 overflow-hidden leading-tight opacity-90">
                > System initialized...<br>> WebSocket listening...
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
  let scene, camera, renderer, raycaster, mouse;
  let slotComponents = [];

  class MedSlot {
    constructor(id, position, scene) {
      this.id = id;
      this.isOpen = false;
      this.status = 'Waiting';
      this.group = new THREE.Group();
      this.group.position.copy(position);
      
      const baseGeom = new THREE.BoxGeometry(1.2, 0.8, 1.5);
      const baseMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4, metalness: 0.1 });
      this.base = new THREE.Mesh(baseGeom, baseMat);
      this.base.castShadow = true;
      this.base.receiveShadow = true;
      this.group.add(this.base);

      const cavityGeom = new THREE.BoxGeometry(1.0, 0.4, 1.3);
      const cavityMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, roughness: 0.8 });
      this.cavity = new THREE.Mesh(cavityGeom, cavityMat);
      this.cavity.position.y = 0.21;
      this.group.add(this.cavity);

      this.lidPivot = new THREE.Group();
      this.lidPivot.position.set(0, 0.4, -0.65);
      this.group.add(this.lidPivot);

      const lidGeom = new THREE.BoxGeometry(1.1, 0.1, 1.4);
      const lidMat = new THREE.MeshStandardMaterial({ color: 0x4a90e2, roughness: 0.3, metalness: 0.2, transparent: true, opacity: 0.8 });
      this.lid = new THREE.Mesh(lidGeom, lidMat);
      this.lid.position.z = 0.65;
      this.lid.castShadow = true;
      this.lid.userData = { slotId: this.id };
      this.lidPivot.add(this.lid);

      const ledGeom = new THREE.SphereGeometry(0.1, 16, 16);
      this.ledMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, emissive: 0x000000, emissiveIntensity: 0 });
      this.led = new THREE.Mesh(ledGeom, this.ledMat);
      this.led.position.set(0, 0.1, 0.85);
      this.group.add(this.led);

      scene.add(this.group);
    }

    update(status) {
      this.status = status;
      const statusColors = {
        'Waiting': { color: 0x888888, emissive: 0x000000, intensity: 0 },
        'Alerting': { color: 0xff9800, emissive: 0xff4500, intensity: 2.0 },
        'Taken': { color: 0x4caf50, emissive: 0x4caf50, intensity: 1.0 },
        'Missed': { color: 0xf44336, emissive: 0xf44336, intensity: 1.0 }
      };

      const config = statusColors[status] || statusColors['Waiting'];
      this.ledMat.color.setHex(config.color);
      this.ledMat.emissive.setHex(config.emissive);
      
      if (status === 'Taken') this.isOpen = true;
      else if (status === 'Waiting' || status === 'Missed') this.isOpen = false;
    }

    animate() {
      const targetRotation = this.isOpen ? -Math.PI * 0.45 : 0;
      this.lidPivot.rotation.x = THREE.MathUtils.lerp(this.lidPivot.rotation.x, targetRotation, 0.1);

      if (this.status === 'Alerting') {
        const pulse = (Math.sin(Date.now() * 0.008) + 1) / 2;
        this.ledMat.emissiveIntensity = 0.5 + pulse * 2.5;
        this.led.scale.setScalar(1 + pulse * 0.2);
      } else {
        this.ledMat.emissiveIntensity = this.status === 'Waiting' ? 0 : 1;
        this.led.scale.setScalar(1);
      }
    }
  }

  function init3D() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xf0f4f8);
    scene.fog = new THREE.Fog(0xf0f4f8, 5, 25);

    camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(6, 6, 10);
    camera.lookAt(0, -0.5, 0);

    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sunlight = new THREE.DirectionalLight(0xffffff, 0.8);
    sunlight.position.set(10, 20, 10);
    sunlight.castShadow = true;
    scene.add(sunlight);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0xe2e8f0 }));
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -1.5;
    floor.receiveShadow = true;
    scene.add(floor);

    const spacing = 1.6;
    for (let i = 0; i < 4; i++) {
      slotComponents.push(new MedSlot(i + 1, new THREE.Vector3((i - 1.5) * spacing, 0, 0), scene));
    }

    raycaster = new THREE.Raycaster();
    mouse = new THREE.Vector2();

    window.addEventListener('mousedown', (e) => {
      mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(scene.children, true);
      for (let intersect of intersects) {
        let obj = intersect.object;
        while (obj && !obj.userData.slotId) obj = obj.parent;
        if (obj && obj.userData.slotId) {
          openSlot(obj.userData.slotId);
          break;
        }
      }
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
    
    animate();
  }

  function animate() {
    requestAnimationFrame(animate);
    scene.rotation.y = Math.sin(Date.now() * 0.0003) * 0.1;
    slotComponents.forEach(s => s.animate());
    renderer.render(scene, camera);
  }

  function load() {
    fetch('/status').then(r => r.json()).then(j => {
      document.getElementById('sim-time').innerText = j.time;
      
      const syncDot = document.getElementById('sync-dot');
      const syncText = document.getElementById('sync-text');
      if(j.synced) {
        syncDot.className = 'size-2 rounded-full bg-green-500 animate-pulse';
        syncText.innerText = 'Real-Time Sync';
      } else {
        syncDot.className = 'size-2 rounded-full bg-orange-500 animate-pulse';
        syncText.innerText = 'Syncing Time...';
      }

      let html = '';
      j.slots.forEach((s, idx) => {
        const isAlerting = s.status === 'Alerting';
        const statusMap = {
            'Waiting': { bg: 'bg-slate-100', text: 'text-slate-600', icon: 'schedule' },
            'Alerting': { bg: 'bg-orange-500', text: 'text-white', icon: 'notifications_active' },
            'Taken': { bg: 'bg-green-500', text: 'text-white', icon: 'check_circle' },
            'Missed': { bg: 'bg-red-500', text: 'text-white', icon: 'error' }
        };
        const st = statusMap[s.status] || statusMap['Waiting'];
        
        html += `
          <div class="p-3 rounded-2xl border transition-all ${isAlerting ? 'slot-active' : 'bg-white/60 border-slate-100'}">
            <div class="flex justify-between items-center mb-2">
              <span class="font-bold text-slate-700">${s.medicine}</span>
              <span class="${st.bg} ${st.text} px-2 py-0.5 rounded-full font-bold flex items-center gap-1" style="font-size: 9px;">
                <span class="material-symbols-outlined" style="font-size: 10px;">${st.icon}</span>
                ${s.status.toUpperCase()}
              </span>
            </div>
            <div class="flex justify-between items-center">
              <span class="text-slate-400 font-medium">Slot ${s.id} · <strong class="text-slate-600">${s.schedule || '--:--'}</strong></span>
              <div class="flex gap-1">
                  <button onclick="openSlot(${s.id})" class="p-1 px-2 rounded-lg bg-slate-100 hover:bg-white border border-slate-200 text-slate-600 transition-all active:scale-90" title="Open Lid">
                    <span class="material-symbols-outlined text-sm">open_in_browser</span>
                  </button>
                  <button onclick="resetSlot(${s.id})" class="p-1 px-2 rounded-lg bg-slate-50 hover:bg-white border border-slate-200 text-slate-400 transition-all active:scale-90" title="Reset Slot">
                    <span class="material-symbols-outlined text-sm">restart_alt</span>
                  </button>
              </div>
            </div>
          </div>`;
          
        if (slotComponents[idx]) slotComponents[idx].update(s.status);
      });
      document.getElementById('slots-container').innerHTML = html;
    });
  }

  function setSlot() {
    const slot = document.getElementById('slot-select').value;
    const hh = document.getElementById('hh-input').value || '0';
    const mm = document.getElementById('mm-input').value || '0';
    const med = document.getElementById('med-input').value;
    fetch(`/set?slot=${slot}&hh=${hh}&mm=${mm}&med=${encodeURIComponent(med)}`).then(() => {
        log(`Slot ${slot} (${med || 'Medicine'}) scheduled for ${hh}:${mm}`);
        load();
    });
  }

  function openSlot(id) {
    fetch(`/open?slot=${id}`).then(() => {
        log(`Slot ${id} opened manually`);
        load();
    });
  }

  function resetSlot(id) {
    fetch(`/set?slot=${id}&hh=-1&mm=0`).then(() => {
        log(`Slot ${id} reset to waiting`);
        load();
    });
  }

  function log(msg) {
      const console = document.getElementById('log-console');
      console.innerHTML = `> ${msg}<br>` + console.innerHTML.split('<br>').slice(0, 2).join('<br>');
  }

  window.addEventListener('load', () => {
    init3D();
    load();
    setInterval(load, 1000);
  });
</script>
</body>
</html>

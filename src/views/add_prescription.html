  <script>
    let medicineCount = 0;
    let testCount = 0;

    function addMedicineRow() {
      const container = document.getElementById('medicinesContainer');
      const template = document.getElementById('medicineTemplate').innerHTML;
      const html = template.replace(/{index}/g, medicineCount);
      
      const div = document.createElement('div');
      div.innerHTML = html;
      const row = div.firstElementChild;
      
      row.querySelector('.med-index').textContent = medicineCount + 1;
      container.appendChild(row);
      
      setupMedicineLogic(row, medicineCount);
      medicineCount++;
    }

    function removeMedicineRow(btn) {
      if (document.querySelectorAll('.medicine-item').length > 1) {
        btn.closest('.medicine-item').remove();
      } else {
        showToast("At least one medicine is required", "error");
      }
    }

    function addTestRow() {
      const container = document.getElementById('testsContainer');
      const template = document.getElementById('testTemplate').innerHTML;
      const html = template.replace(/{index}/g, testCount);
      const div = document.createElement('div');
      div.innerHTML = html;
      container.appendChild(div.firstElementChild);
      testCount++;
    }

    function setupMedicineLogic(row, index) {
      const nameInput = row.querySelector('.med-name-input');
      const suggestions = row.querySelector('.med-suggestions');
      const dosageSelect = row.querySelector('.dosage-select');
      const freqSelect = row.querySelector('.freq-select');
      const timeSlotsContainer = row.querySelector('.time-slots-container');

      // Autocomplete
      nameInput.addEventListener('input', async () => {
        const query = nameInput.value.trim();
        suggestions.innerHTML = "";
        if (query.length < 2) { suggestions.classList.add('hidden'); return; }

        const res = await fetch(`medicines_autocomplete.php?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        
        if (data.length > 0) {
          data.forEach(med => {
            const li = document.createElement('li');
            li.textContent = med.name;
            li.className = "px-4 py-2 hover:bg-primary/10 cursor-pointer text-sm";
            li.onclick = () => {
              nameInput.value = med.name;
              suggestions.classList.add('hidden');
              loadDosages(med.name, dosageSelect);
            };
            suggestions.appendChild(li);
          });
          suggestions.classList.remove('hidden');
        } else {
          suggestions.classList.add('hidden');
        }
      });

      // Frequency logic
      freqSelect.addEventListener('change', () => updateTimeSlots(freqSelect.value, timeSlotsContainer, index));
      updateTimeSlots('once', timeSlotsContainer, index); // init
    }

    async function loadDosages(medicine, select) {
      const res = await fetch(`medicines_autocomplete.php?medicine=${encodeURIComponent(medicine)}`);
      const data = await res.json();
      select.innerHTML = '<option value="">Select dosage</option>';
      data.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.dosage;
        opt.textContent = d.dosage;
        select.appendChild(opt);
      });
    }

    function updateTimeSlots(type, container, index) {
      container.innerHTML = "";
      let times = [];
      if (type === 'once') times = ['08:00'];
      else if (type === 'twice') times = ['08:00', '20:00'];
      else if (type === 'thrice') times = ['08:00', '14:00', '20:00'];
      else if (type === 'custom') {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = "px-3 py-1 bg-primary/10 text-primary rounded-lg text-xs font-bold flex items-center gap-1";
        btn.innerHTML = '<span class="material-symbols-outlined text-sm">add</span> Add Time';
        btn.onclick = () => addCustomTime(container, index);
        container.appendChild(btn);
        return;
      } else {
        container.innerHTML = '<span class="text-xs text-text-sub-light italic">No scheduled times for "As Needed"</span>';
        return;
      }

      times.forEach(t => {
        const input = document.createElement('input');
        input.type = 'time';
        input.name = `medicines[${index}][time_slots][]`;
        input.value = t;
        input.className = "h-9 px-2 rounded-lg border border-input-border-light dark:border-input-border-dark bg-background-light dark:bg-background-dark text-xs";
        container.appendChild(input);
      });
    }

    function addCustomTime(container, index) {
      const wrap = document.createElement('div');
      wrap.className = "flex items-center gap-1";
      wrap.innerHTML = `
        <input type="time" name="medicines[${index}][time_slots][]" value="08:00" class="h-9 px-2 rounded-lg border border-input-border-light dark:border-input-border-dark bg-background-light dark:bg-background-dark text-xs">
        <button type="button" onclick="this.parentElement.remove()" class="text-red-500"><span class="material-symbols-outlined text-sm">close</span></button>
      `;
      container.insertBefore(wrap, container.lastElementChild);
    }

    document.getElementById('prescriptionForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const formData = new FormData(this);
      
      try {
        const response = await fetch('add_prescription.php', { method: 'POST', body: formData });
        const data = await response.json();
        if (data.success) {
          showToast("Prescription saved successfully!", "success");
          setTimeout(() => window.location.href = 'prescription_history.php', 1500);
        } else {
          showToast(data.message || "Failed to save", "error");
        }
      } catch (err) {
        showToast("Connection error", "error");
      }
    });

    function showToast(msg, type = "success") {
      const toast = document.getElementById('toast');
      const icon = document.getElementById('toastIcon');
      const text = document.getElementById('toastMessage');
      
      toast.className = "fixed top-6 right-6 z-[9999] max-w-sm rounded-xl shadow-2xl border p-4 flex items-start gap-3 transition-all " + 
        (type === 'success' ? "bg-green-50 border-green-200 text-green-800" : "bg-red-50 border-red-200 text-red-800");
      
      icon.textContent = type === 'success' ? 'check_circle' : 'error';
      text.textContent = msg;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // Init
    window.onload = () => {
      addMedicineRow();
    };
  </script>
